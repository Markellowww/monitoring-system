server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: config-manager

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/config_db}
    username: ${SPRING_DATASOURCE_USERNAME:alert}
    password: ${SPRING_DATASOURCE_PASSWORD:alert_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

jwt:
  secret: ${JWT_SECRET:change-this-secret-key-in-production-min-256-bits}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    com.alertsystem: DEBUG
