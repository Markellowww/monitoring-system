server:
  port: ${SERVER_REPORTS_PORT:8085}

spring:
  application:
    name: visual-reports

  datasource:
    url: ${SPRING_REPORTS_DATASOURCE_URL:jdbc:postgresql://localhost:5432/reports_db}
    username: ${SPRING_REPORTS_DATASOURCE_USERNAME:alert}
    password: ${SPRING_REPORTS_DATASOURCE_PASSWORD:alert_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9093}

  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: always
    properties:
      org.quartz.jobStore.class: org.springframework.scheduling.quartz.LocalDataSourceJobStore

config-manager:
  url: ${CONFIG_MANAGER_URL:http://localhost:8081}

tsdb-storage:
  url: ${TSDB_STORAGE_URL:http://localhost:8083}

analytics-alerting:
  url: ${ANALYTICS_ALERTING_URL:http://localhost:8084}

reports:
  storage-path: ${REPORTS_STORAGE_PATH:/tmp/reports}

logging:
  level:
    com.alertsystem: DEBUG
