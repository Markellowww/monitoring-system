server:
  port: ${SERVER_PORT:8086}

spring:
  application:
    name: online-notifier

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notifier_db}
    username: ${SPRING_DATASOURCE_USERNAME:alert}
    password: ${SPRING_DATASOURCE_PASSWORD:alert_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9093}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

config-manager:
  url: ${CONFIG_MANAGER_URL:http://localhost:8081}

notifier:
  dedup-ttl-sec: 600
  telegram:
    base-url: https://api.telegram.org

logging:
  level:
    com.alertsystem: DEBUG
